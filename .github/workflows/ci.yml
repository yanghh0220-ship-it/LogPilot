# .github/workflows/ci.yml - GitHub Actions CI 配置
#
# 作用：每次推送代码或提交 PR 时，自动运行代码检查和测试
# 为什么需要 CI？
#   - 自动发现问题，避免低级 bug 合入主分支
#   - 保证代码风格一致
#   - 让协作者放心：过了 CI 的代码至少不会跑不起来

name: CI

# ============================================
# 触发条件
# ============================================
on:
  push:
    branches: [main]      # push 到 main 分支时触发
  pull_request:
    branches: [main]      # PR 目标是 main 分支时触发

# ============================================
# Job：代码检查 + 测试
# ============================================
jobs:
  lint-and-test:
    name: lint-and-test
    runs-on: ubuntu-latest

    steps:
      # ---- Step 1：检出代码 ----
      # 为什么？CI 环境是全新的，需要先把代码拉下来
      - name: 检出代码
        uses: actions/checkout@v4

      # ---- Step 2：配置 Python 环境 ----
      # 为什么指定 3.10？与本地开发环境保持一致，避免版本差异导致的 bug
      # cache: "pip" 会缓存已下载的包，下次 CI 更快
      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # ---- Step 3：安装依赖 ----
      # 先升级 pip 本身，避免旧版 pip 解析依赖出错
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      # ---- Step 4：Flake8 严重错误检查 ----
      # 只检查会导致程序崩溃的错误：
      #   E9   = 语法错误（SyntaxError）
      #   F63  = 无效的 print 语法等
      #   F7   = 语句错误（如 break outside loop）
      #   F82  = 未定义的变量名
      # 这一步失败会阻断后续步骤（默认行为）
      - name: Flake8 严重错误检查
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv

      # ---- Step 5：Flake8 代码风格检查 ----
      # --max-line-length=120：放宽行宽限制（PEP8 默认 79 太窄）
      # --exit-zero：即使有风格问题也不阻断 CI
      # 为什么？风格问题不致命，但要在 PR 中提醒开发者
      - name: Flake8 代码风格检查
        run: |
          flake8 . --count --max-line-length=120 --exit-zero --statistics --exclude=venv,.venv

      # ---- Step 6：运行单元测试 ----
      # -v：显示每个测试用例的名称和结果
      # --tb=short：失败时只显示简短的 traceback
      # continue-on-error: true：测试失败不阻断 CI（初期项目允许失败）
      - name: 运行单元测试
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: true

      # ---- Step 7：检查必要文件 ----
      # 确保项目的关键文件没有被误删
      # 存在打印 ✅，不存在打印 ❌，一眼就能看出问题
      - name: 检查必要文件
        run: |
          echo "检查项目必要文件..."
          for file in README.md LICENSE .env.example requirements.txt; do
            if [ -f "$file" ]; then
              echo "✅ $file 存在"
            else
              echo "❌ $file 缺失"
            fi
          done
